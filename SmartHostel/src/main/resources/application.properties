# Database (Using PostgreSQL from Aiven)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:defaultdb}?sslmode=require
spring.datasource.username=${DB_USER:avnadmin}
spring.datasource.password=${DB_PASSWORD:your_password_here}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:SmartHostelSecretKey2024VeryLongSecureKeyForJWT}
jwt.expiration=86400000

# Server
server.port=${PORT:8080} 